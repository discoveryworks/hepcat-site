<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Saul Bass-style hepcat: flat cut-paper shapes, jagged hand-cut edges -->
  <!-- field -->
  <rect width="1024" height="1024" fill="#6D28D9"/>
  <!-- offset backing blob, darker purple, off-register like a misprint -->
  <path d="M 190 330 L 480 250 L 800 320 L 880 640 L 780 940 L 420 970 L 170 820 L 130 540 Z"
        fill="#4C1D95"/>
  <!-- ears: black triangles poking out from under the beret, lavender inner -->
  <path d="M 300 420 L 232 258 L 420 340 Z" fill="#0A0A0A"/>
  <path d="M 308 400 L 268 300 L 380 350 Z" fill="#6D28D9"/>
  <path d="M 700 430 L 782 272 L 590 336 Z" fill="#0A0A0A"/>
  <path d="M 692 410 L 740 312 L 622 352 Z" fill="#6D28D9"/>
  <!-- head: black, jagged oval -->
  <path d="M 330 400 L 470 340 L 620 355 L 700 450 L 720 610 L 680 780 L 560 880 L 430 870 L 330 760 L 300 570 Z"
        fill="#0A0A0A"/>
  <!-- beret: lavender, tilted, sitting heavy on the left -->
  <path d="M 240 375 L 350 280 L 540 235 L 690 285 L 715 360 L 560 330 L 380 350 L 265 405 Z"
        fill="#C4B5FD"/>
  <!-- beret stem -->
  <path d="M 470 240 L 505 195 L 535 235 L 500 260 Z" fill="#C4B5FD"/>
  <!-- whiskers: hand-cut white slivers, three per side -->
  <path d="M 318 618 L 138 578 L 140 600 L 316 644 Z" fill="#F5F3FF"/>
  <path d="M 322 668 L 156 682 L 160 706 L 324 694 Z" fill="#F5F3FF"/>
  <path d="M 330 716 L 186 782 L 196 804 L 336 740 Z" fill="#F5F3FF"/>
  <path d="M 706 610 L 884 564 L 888 588 L 710 636 Z" fill="#F5F3FF"/>
  <path d="M 708 660 L 872 668 L 870 692 L 706 686 Z" fill="#F5F3FF"/>
  <path d="M 698 708 L 830 768 L 820 790 L 694 732 Z" fill="#F5F3FF"/>
  <!-- sunglasses: one wraparound white shape, tilted, with big dark lenses -->
  <path d="M 322 505 L 700 468 L 706 528 L 688 610 L 552 622 L 540 560 L 492 566 L 486 628 L 352 640 L 326 560 Z"
        fill="#F5F3FF"/>
  <!-- lenses: near-black purple, big and opaque -->
  <path d="M 360 530 L 480 518 L 472 594 L 368 604 Z" fill="#1E0A4A"/>
  <path d="M 548 512 L 668 500 L 660 578 L 556 588 Z" fill="#1E0A4A"/>
  <!-- T-nose: lavender crossbar + stem down to the mouth -->
  <path d="M 462 650 L 578 644 L 580 678 L 464 684 Z" fill="#C4B5FD"/>
  <path d="M 504 680 L 542 678 L 538 726 L 508 728 Z" fill="#C4B5FD"/>
  <!-- mouth: thin sly line -->
  <path d="M 452 728 L 592 718 L 594 740 L 454 750 Z" fill="#6D28D9"/>
  <!-- goatee: lavender jagged patch on the chin -->
  <path d="M 500 782 L 572 774 L 588 812 L 558 868 L 518 874 L 492 824 Z" fill="#C4B5FD"/>
  <!-- jazzy eighth-note, hand-cut, nudged inside the corner mask -->
  <path d="M 790 130 L 820 122 L 838 330 L 800 337 Z" fill="#F5F3FF"/>
  <path d="M 762 315 L 830 297 L 848 363 L 785 385 Z" fill="#F5F3FF"/>
  <path d="M 818 125 L 900 160 L 905 230 L 842 190 Z" fill="#F5F3FF"/>
</svg>
